<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminalzinho рҹ–ҘпёҸ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #2d2d2d;
    --surface: #3a3a3a;
    --text: #e8e8e8;
    --border: #4a4a4a;
    --prompt: #8edf8e;
    --red: #ff9a9a;
    --orange: #ffbe8a;
    --yellow: #fff1a0;
    --green: #a8f0a8;
    --blue: #a0d4ff;
    --purple: #d4a8ff;
    --pink: #ffb3d9;
    --teal: #8aeaea;
    --overlay: #999;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f5f5;
      --surface: #e8e8e8;
      --text: #333;
      --border: #ccc;
      --prompt: #4caf50;
      --red: #ef5350;
      --orange: #ff9800;
      --yellow: #d4a017;
      --green: #4caf50;
      --blue: #42a5f5;
      --purple: #ab47bc;
      --pink: #ec407a;
      --teal: #26a69a;
      --overlay: #888;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .titlebar {
    background: var(--surface);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .titlebar .dots { display: flex; gap: 6px; }
  .titlebar .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: var(--red); }
  .dot.yellow { background: var(--yellow); }
  .dot.green { background: var(--green); }
  .titlebar .title { flex: 1; text-align: center; font-size: 13px; color: var(--overlay); }

  .terminal {
    flex: 1;
    padding: 16px 16px 16px 20px;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.6;
  }

  .terminal::-webkit-scrollbar { width: 8px; }
  .terminal::-webkit-scrollbar-track { background: var(--bg); }
  .terminal::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

  .line { margin-bottom: 2px; white-space: pre-wrap; word-wrap: break-word; }
  .line .prompt { color: var(--prompt); font-weight: bold; }
  .line .cmd { color: var(--text); }

  .output { color: var(--text); margin-bottom: 4px; white-space: pre-wrap; }
  .output.art { color: var(--yellow); }
  .output.info { color: var(--blue); }
  .output.success { color: var(--green); }
  .output.magic { color: var(--purple); }
  .output.error { color: var(--red); }
  .output.peach { color: var(--orange); }
  .output.teal { color: var(--teal); }
  .output.pink { color: var(--pink); }

  .input-line { display: flex; align-items: center; clear: both; }

  @keyframes promptPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  .input-line .prompt { color: var(--prompt); font-weight: bold; animation: promptPulse 2s ease-in-out infinite; }

  #input {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    outline: none;
    flex: 1;
    caret-color: var(--prompt);
    text-transform: uppercase;
  }

  @keyframes terminalFlash {
    0%   { background: var(--bg); }
    30%  { background: color-mix(in srgb, var(--green) 20%, var(--bg)); }
    100% { background: var(--bg); }
  }
  .flash { animation: terminalFlash 0.4s ease-out; }

  .emoji-big { font-size: 32px; line-height: 1.4; }
  .emoji-flood { font-size: 24px; line-height: 1.3; word-break: break-all; }

  .celebration { }

  .rainbow {
    background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow), var(--green), var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: bold;
  }

  .giant { font-size: 28px; font-weight: bold; }
  .counter { font-size: 48px; font-weight: bold; color: var(--yellow); }
  .creature-art { color: var(--purple); font-size: 14px; line-height: 1.2; }

  .challenge-box {
    border: 2px solid var(--purple);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 4px 0 8px;
    display: inline-block;
  }
</style>
</head>

function makeCreature(letters) {
  const chars = letters.slice(0, 12).split('');
  const eyes = ['o','O','@','*','вҖў','В°'];
  const e1 = eyes[Math.floor(Math.random() * eyes.length)];
  const e2 = eyes[Math.floor(Math.random() * eyes.length)];
  const bodyChars = chars.slice(0, 6).join('');
  const legChars = chars.slice(6, 10).join('') || 'vvvv';
  const creatures = [
    `  (${e1} ${e2})\n / ${bodyChars} \\\n  ${legChars}`,
    `   ${e1}___${e2}\n  /${bodyChars}\\\n  ~${legChars}~`,
    ` \\(${e1}.${e2})/\n  |${bodyChars}|\n  /${legChars}\\`,
    `  {${e1} ${e2}}\n <|${bodyChars}|>\n  ^${legChars}^`,
  ];
  return creatures[Math.floor(Math.random() * creatures.length)];
}

function randomEmoji(n) {
  let r = '';
  for (let i = 0; i < n; i++) r += allEmoji[Math.floor(Math.random() * allEmoji.length)];
  return r;
}

function addLine(prompt, cmd) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = `<span class="prompt">${prompt}</span><span class="cmd">${cmd.toUpperCase()}</span>`;
  terminal.appendChild(div);
}

function addOutput(text, cls = '') {
  const div = document.createElement('div');
  div.className = `output ${cls}`;
  div.innerHTML = text;
  terminal.appendChild(div);
  return div;
}

function scrollToBottom() { terminal.scrollTop = terminal.scrollHeight; }

function showChallenge() {
  const c = challenges[Math.floor(Math.random() * challenges.length)];
  pendingChallenge = c;
  addOutput(`<div class="challenge-box"><span class="emoji-big">${c.prompt}</span><br><span style="color:var(--purple)">${c.hint}</span></div>`, 'celebration');
  scrollToBottom();
}

async function countUpAnimation(target) {
  const div = document.createElement('div');
  div.className = 'counter';
  terminal.appendChild(div);
  const steps = 30;
  const increment = Math.ceil(target / steps);
  let current = 0;
  for (let i = 0; i < steps; i++) {
    current = Math.min(current + increment, target);
    div.textContent = current.toLocaleString('pt-BR');
    scrollToBottom();
    await new Promise(r => setTimeout(r, 60));
  }
  div.textContent = target.toLocaleString('pt-BR') + ' !';
  addOutput(randomEmoji(15), 'emoji-flood celebration');
  scrollToBottom();
}

function isGibberish(text) {
  if (text.length < 3) return false;
  const lower = text.toLowerCase();
  if (isKnownWord(lower)) return false;
  if (/^\d+$/.test(text)) return false;
  if (lower.length === 1) return false;
  if (!/\s/.test(text) && text.length > 4) return true;
  return text.length > 6;
}

async function handleCommand(raw) {

      pendingChallenge = null;
      gibberishCount = 0;
      addOutput(`<span class="rainbow giant">SIM! вңЁрҹҺүвңЁ</span>`, 'celebration');
      scrollToBottom();

    gibberishCount = 0;

    const word  = letterWords[lower] || '';
    addOutput(`<span class="rainbow giant">${upper}</span>  ${emoji}`, 'celebration');

    scrollToBottom(); return;

    gibberishCount = 0;
    const n = parseInt(text);

      addOutput(`contando atГ© ${n.toLocaleString('pt-BR')}...`, 'magic');
      await countUpAnimation(n);
      scrollToBottom(); return;

      const comp = numberComparisons[n];

// Cria a linha de input dentro do terminal (apГіs welcome para nГЈo destruir o innerHTML)
const inputLine = document.createElement('div');
inputLine.className = 'input-line';
inputLine.innerHTML = '<span class="prompt">digite aqui&gt;&nbsp;</span>';
const inputEl = document.createElement('input');
inputEl.type = 'text';
inputEl.id = 'input';
inputEl.autocomplete = 'off';
inputEl.autocapitalize = 'characters';
inputEl.spellcheck = false;
inputEl.style.cssText = 'background:none;border:none;color:var(--text);font-family:"JetBrains Mono",monospace;font-size:16px;outline:none;flex:1;caret-color:var(--prompt);text-transform:uppercase;';
inputLine.appendChild(inputEl);
terminal.appendChild(inputLine);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    terminal.classList.remove('flash');
    void terminal.offsetWidth;
    terminal.classList.add('flash');
    terminal.addEventListener('animationend', () => terminal.classList.remove('flash'), { once: true });
    handleCommand(inputEl.value);
    inputEl.value = '';
  }
});
document.addEventListener('click', () => inputEl.focus());
inputEl.focus();

// Sobrescreve scrollToBottom para manter a linha de input no fim do conteГәdo
scrollToBottom = function() {
  terminal.appendChild(inputLine);
  terminal.scrollTop = terminal.scrollHeight;
  inputEl.focus();
};
